name: Build VTM

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'CMake build type'
        required: false
        default: 'Release'
      test_sequence_filename:
        description: 'Test sequence filename to download from Google Drive (leave blank to skip)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build VTM
        run: |
          cd build
          make -j$(nproc)

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: vtm-binaries
          path: |
            bin/**/EncoderApp
            bin/**/DecoderApp

      - name: Download test sequence from Google Drive
        if: ${{ github.event.inputs.test_sequence_filename != '' }}
        uses: tealrobotco/git-action-download-from-gdrive@main
        with:
          credentials: ${{ secrets.DRIVE_CREDENTIALS }}
          folder-id: ${{ secrets.DRIVE_FOLDER_ID }}
          filename: ${{ github.event.inputs.test_sequence_filename }}
          output-path: test_sequences/${{ github.event.inputs.test_sequence_filename }}
          max-attempts: 3
          retry-delay: 5
          verbose: true

      - name: Upload test sequence artifact
        if: ${{ github.event.inputs.test_sequence_filename != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-sequence
          path: test_sequences/
