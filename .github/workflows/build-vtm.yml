name: Build VTM

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'CMake build type'
        required: false
        default: 'Release'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build VTM
        run: |
          cd build
          make -j$(nproc)

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: vtm-binaries
          path: |
            bin/**/EncoderApp
            bin/**/DecoderApp

      - name: Download test sequences from Google Drive
        run: |
          pip install --quiet gdown
          mkdir -p test_sequences
          gdown --folder "https://drive.google.com/drive/folders/1UTcDr13oZb6qzkoiAdiqP_qhcN_qpQoe" -O test_sequences --remaining-ok

      - name: Upload test sequences artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-sequences
          path: test_sequences/
