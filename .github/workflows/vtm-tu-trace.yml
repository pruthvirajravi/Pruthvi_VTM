# Phase 1 -- VTM coded-TU workload trace (self-contained; tools embedded as base64).
# PARAMETERIZED: enc_cfg selects the JVET coding configuration so the same
# workflow traces AI / RA / LDB / LDP. Decoder-side capture -> final coded TUs.
name: VTM TU Trace (Phase 1)
on:
  workflow_dispatch:
    inputs:
      enc_cfg:
        description: 'Encoder cfg under cfg/ (e.g. encoder_intra_vtm.cfg)'
        required: false
        default: 'encoder_randomaccess_vtm.cfg'
      config_tag:
        description: 'Short tag recorded in the trace (AI/RA/LDB/LDP)'
        required: false
        default: 'RA'
      frames:
        description: 'Frames per clip'
        required: false
        default: '30'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - name: Write instrumentation tool
        run: |
          mkdir -p tools
          echo  | base64 -d > tools/inject_tu_trace.py
      - name: Instrument TrQuant.cpp
        run: python3 tools/inject_tu_trace.py .
      - name: Configure CMake
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
      - name: Build Encoder + Decoder
        run: cd build && make -j"$(nproc)" EncoderApp DecoderApp
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: vtm-binaries
          path: |
            bin/**/EncoderApp
            bin/**/DecoderApp
          if-no-files-found: error
  trace:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sequence: [Kimono, ParkScene, RaceHorsesC, BQMall, RaceHorsesD, BQSquare, FourPeople, Johnny]
        qp: ['22', '27', '32', '37']
    steps:
      - uses: actions/checkout@v4
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: vtm-binaries
          path: bin
      - name: Download sequences
        run: |
          pip install --quiet gdown
          mkdir -p test_sequences
          gdown --folder "https://drive.google.com/drive/folders/1UTcDr13oZb6qzkoiAdiqP_qhcN_qpQoe" -O test_sequences
      - name: Encode -> .bin (trace OFF)
        run: |
          set -u
          ENC="$(find bin -type f -name 'EncoderApp' | head -n1)"; chmod +x "$ENC"
          FRAMES="${{ github.event.inputs.frames || '30' }}"
          ENCCFG="${{ github.event.inputs.enc_cfg || 'encoder_randomaccess_vtm.cfg' }}"
          LABEL="${{ matrix.sequence }}"; QP="${{ matrix.qp }}"
          case "$LABEL" in
            Kimono)      CFG=Kimono.cfg;      GLOB='*Kimono*1920x1080*.yuv' ;;
            ParkScene)   CFG=ParkScene.cfg;   GLOB='*ParkScene*1920x1080*.yuv' ;;
            RaceHorsesC) CFG=RaceHorsesC.cfg; GLOB='*RaceHorses*832x480*.yuv' ;;
            BQMall)      CFG=BQMall.cfg;      GLOB='*BQMall*832x480*.yuv' ;;
            RaceHorsesD) CFG=RaceHorses.cfg;  GLOB='*RaceHorses*416x240*.yuv' ;;
            BQSquare)    CFG=BQSquare.cfg;    GLOB='*BQSquare*416x240*.yuv' ;;
            FourPeople)  CFG=FourPeople.cfg;  GLOB='*FourPeople*1280x720*.yuv' ;;
            Johnny)      CFG=Johnny.cfg;      GLOB='*Johnny*1280x720*.yuv' ;;
            *) echo "unknown $LABEL"; exit 1 ;;
          esac
          CFG="cfg/per-sequence/$CFG"; mkdir -p encode_out
          YUV="$(find test_sequences -type f -iname "$GLOB" | head -n1)"
          if [ -z "$YUV" ]; then echo "YUV not found $LABEL"; exit 1; fi
          FRAMEARG=""; [ -n "$FRAMES" ] && FRAMEARG="-f $FRAMES"
          "$ENC" -c "cfg/$ENCCFG" -c "$CFG" -i "$YUV" \
            -b "encode_out/${{ matrix.sequence }}_qp${{ matrix.qp }}.bin" -o /dev/null -q "$QP" $FRAMEARG
      - name: Decode with TU trace ON
        env:
          VTM_TU_TRACE: ${{ github.workspace }}/${{ matrix.sequence }}_qp${{ matrix.qp }}.tutrace.csv
        run: |
          set -u
          DEC="$(find bin -type f -name 'DecoderApp' | head -n1)"; chmod +x "$DEC"
          "$DEC" -b "encode_out/${{ matrix.sequence }}_qp${{ matrix.qp }}.bin" -o /dev/null
          echo "rows: $(wc -l < ${{ matrix.sequence }}_qp${{ matrix.qp }}.tutrace.csv)"
      - name: Upload per-combo trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tutrace-${{ matrix.sequence }}-qp${{ matrix.qp }}
          path: ${{ matrix.sequence }}_qp${{ matrix.qp }}.tutrace.csv
          if-no-files-found: error
  merge:
    needs: trace
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write merge tool
        run: |
          mkdir -p tools
          echo  | base64 -d > tools/merge_tu_trace.py
      - name: Collect traces
        uses: actions/download-artifact@v4
        with:
          pattern: tutrace-*
          path: raw
          merge-multiple: true
      - name: Merge + classify
        run: |
          python3 tools/merge_tu_trace.py raw out --config "${{ github.event.inputs.config_tag || 'RA' }}"
          echo "----- tu_summary.txt -----"; cat out/tu_summary.txt
      - name: Upload consolidated workload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tu-traces
          path: |
            out/tu_trace.csv
            out/tu_distribution.csv
            out/tu_summary.txt
          if-no-files-found: error
